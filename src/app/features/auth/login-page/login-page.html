<div class="text-center">
  <span nz-icon nzType="appstore" class="text-heading text-primary"></span>
  <h1 class="mt-sm mx-0 mb-0 text-subtitle font-semibold">{{ 'auth.login.title' | transloco }}</h1>
  <p class="mt-xs mx-0 mb-lg text-text-secondary">{{ 'auth.login.subtitle' | transloco }}</p>

  <form nz-form nzLayout="vertical" class="text-left" [formGroup]="form" (ngSubmit)="onSubmit()">
    @if (errorMessage(); as message) {
      <nz-alert nzType="error" [nzMessage]="message" nzShowIcon class="mb-md" />
    }

    <app-text-field
      name="username"
      [control]="form.controls.username"
      [label]="'auth.login.username.label' | transloco"
      [placeholder]="'auth.login.username.placeholder' | transloco"
    />

    <app-text-field
      name="password"
      type="password"
      [control]="form.controls.password"
      [label]="'auth.login.password.label' | transloco"
      [placeholder]="'auth.login.password.placeholder' | transloco"
    />

    <button nz-button nzType="primary" nzBlock type="submit" [nzLoading]="loading()" class="mt-sm">
      <span nz-icon nzType="login"></span>
      <span>{{ 'auth.login.submit' | transloco }}</span>
    </button>
  </form>
</div>
