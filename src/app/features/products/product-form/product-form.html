<form
  nz-form
  nzLayout="vertical"
  class="app-product-form"
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
>
  <app-text-field
    name="name"
    [control]="form.controls.name"
    [label]="'products.form.name.label' | transloco"
    [placeholder]="'products.form.name.placeholder' | transloco"
  />

  <div class="app-product-form__row">
    <app-number-field
      class="app-product-form__col"
      name="price"
      [control]="form.controls.price"
      [label]="'products.form.price.label' | transloco"
      [step]="1000"
      [formatter]="priceFormatter"
      [parser]="priceParser"
      [errorMessage]="'products.form.price.error' | transloco"
    />

    <app-number-field
      class="app-product-form__col"
      name="stock"
      [control]="form.controls.stock"
      [label]="'products.form.stock.label' | transloco"
      [errorMessage]="'products.form.stock.error' | transloco"
    />
  </div>

  <div class="app-product-form__row">
    <app-select-field
      class="app-product-form__col"
      name="category"
      [control]="form.controls.category"
      [options]="categoryOptions"
      [label]="'products.form.category.label' | transloco"
    />

    <app-multi-select-field
      class="app-product-form__col"
      name="tags"
      [control]="form.controls.tags"
      [options]="tagOptions"
      [label]="'products.form.tags.label' | transloco"
    />
  </div>

  <app-radio-group-field
    name="status"
    [control]="form.controls.status"
    [options]="statusOptions"
    [label]="'products.form.status.label' | transloco"
  />

  <app-checkbox-field
    name="featured"
    [control]="form.controls.featured"
    [label]="'products.form.featured.label' | transloco"
  />

  <app-textarea-field
    name="description"
    [control]="form.controls.description"
    [label]="'products.form.description.label' | transloco"
  />

  <div class="app-product-form__row">
    <app-date-field
      class="app-product-form__col"
      name="releaseDate"
      [control]="form.controls.releaseDate"
      [label]="'products.form.release_date.label' | transloco"
    />

    <app-date-field
      class="app-product-form__col"
      name="publishedAt"
      [control]="form.controls.publishedAt"
      [label]="'products.form.published_at.label' | transloco"
      [showTime]="true"
    />
  </div>

  <div class="app-product-form__actions">
    <button nz-button type="button" (click)="onCancel()">
      {{ 'common.actions.cancel' | transloco }}
    </button>
    <button nz-button nzType="primary" type="submit">
      <span nz-icon nzType="check"></span>
      <span>{{ 'common.actions.save' | transloco }}</span>
    </button>
  </div>
</form>
