<div>
  <app-page-header
    [breadcrumbItems]="breadcrumbItems()"
    [title]="headerTitle()"
    [subtitle]="headerSubtitle()"
  />

  <nz-card [nzBordered]="false" class="rounded-md shadow-sm">
    <app-product-form
      [product]="product()"
      [saving]="saving()"
      (save)="onSave($event)"
      (cancelled)="onCancel()"
      (existingFileRemoved)="onExistingFileRemoved($event)"
    />
  </nz-card>
</div>
