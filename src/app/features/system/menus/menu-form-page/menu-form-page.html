<div>
  <app-page-header [breadcrumbItems]="breadcrumbItems()" [title]="headerTitle()" />

  <nz-card [nzBordered]="false" class="rounded-md shadow-sm">
    <app-menu-form
      [menu]="menu()"
      [allMenus]="allMenus()"
      [defaultParentId]="parentId() ?? null"
      [saving]="saving()"
      (save)="onSave($event)"
      (cancelled)="onCancel()"
    />
  </nz-card>
</div>
