<nz-layout class="min-h-screen">
  <nz-header class="flex items-center justify-between bg-surface border-b border-border px-lg">
    <span class="text-title font-bold text-text">Customer Portal</span>

    <div class="flex items-center gap-sm">
      <app-theme-toggle />
      <nz-avatar nzIcon="user" />
      @if (authService.currentUser(); as user) {
        <span>{{ user.username }}</span>
      }
    </div>
  </nz-header>

  <nz-layout>
    <nz-sider class="bg-surface border-r border-border" [nzCollapsible]="false" nzWidth="220">
      <ul nz-menu nzMode="inline">
        @for (item of navMenuService.visibleItems(); track item.route) {
          <li nz-menu-item nzMatchRouter>
            <a [routerLink]="item.route">
              @if (item.icon) {
                <span nz-icon [nzType]="item.icon"></span>
              }
              <span>{{ item.label }}</span>
            </a>
          </li>
        }
      </ul>
    </nz-sider>

    <nz-content class="m-md p-lg bg-surface rounded-md">
      <router-outlet />
    </nz-content>
  </nz-layout>
</nz-layout>
