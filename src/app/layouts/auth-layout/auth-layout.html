<div class="app-auth-layout">
  @defer (on immediate) {
    <app-network-background class="app-auth-layout__background" />
  } @placeholder {
    <div class="app-auth-layout__background app-auth-layout__background--placeholder"></div>
  }

  <div class="app-auth-layout__toolbar">
    <app-language-switcher />
  </div>

  <nz-card class="app-auth-layout__card">
    <router-outlet />
  </nz-card>
</div>
