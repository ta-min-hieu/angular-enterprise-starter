<div class="flex flex-col gap-sm">
  <div
    class="grid grid-cols-1 gap-md tablet:grid-cols-2 laptop:grid-cols-4"
    nz-form
    nzLayout="vertical"
  >
    <ng-content />
  </div>

  <div class="flex justify-end">
    <!-- app-filter-bar__clear: class hook cho test (không mang style riêng), xem filter-bar.spec.ts. -->
    <button
      nz-button
      nzType="text"
      type="button"
      class="app-filter-bar__clear"
      [disabled]="!hasActiveFilters()"
      (click)="onClear()"
    >
      <span nz-icon nzType="close-circle"></span>
      <span>{{ 'common.actions.clear_filters' | transloco }}</span>
    </button>
  </div>
</div>
