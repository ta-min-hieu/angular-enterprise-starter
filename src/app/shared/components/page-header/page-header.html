<div>
  <nz-breadcrumb class="mb-sm">
    <nz-breadcrumb-item>
      <span nz-icon nzType="home"></span>
    </nz-breadcrumb-item>
    @for (item of breadcrumbItems(); track item.label) {
      <nz-breadcrumb-item>
        @if (item.link) {
          <a [routerLink]="item.link">{{ item.label | transloco }}</a>
        } @else {
          {{ item.label | transloco }}
        }
      </nz-breadcrumb-item>
    }
  </nz-breadcrumb>

  <div
    class="flex flex-col gap-md mb-lg tablet:flex-row tablet:items-center tablet:justify-between"
  >
    <div>
      <h1 class="m-0 text-title font-bold">{{ title() | transloco }}</h1>
      @if (subtitle()) {
        <!-- app-page-header__subtitle: class hook cho test (không mang style riêng), xem
             page-header.spec.ts. -->
        <p class="app-page-header__subtitle mt-xs mx-0 mb-0 text-text-secondary">
          {{ subtitle() | transloco }}
        </p>
      }
    </div>

    @if (addLink()) {
      <a [routerLink]="addLink()" nz-button nzType="primary">
        <span nz-icon nzType="plus"></span>
        <span>{{ addLabel() | transloco }}</span>
      </a>
    }
  </div>
</div>
