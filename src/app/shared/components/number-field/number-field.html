<nz-form-item>
  <nz-form-label [nzFor]="resolvedId()" [nzRequired]="required()">{{ label() }}</nz-form-label>
  <nz-form-control [nzErrorTip]="resolvedErrorMessage()">
    <nz-input-number
      [nzId]="resolvedId()"
      [formControl]="control()"
      [nzMin]="min()"
      [nzMax]="max()"
      [nzStep]="step()"
      [nzFormatter]="formatter()"
      [nzParser]="parser()"
    />
  </nz-form-control>
</nz-form-item>
