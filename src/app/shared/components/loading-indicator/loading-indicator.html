@if (fullscreen()) {
  <!-- app-loading-indicator--fullscreen: class hook cho test (không mang style riêng), xem
       loading-indicator.spec.ts. -->

    class="app-loading-indicator--fullscreen flex items-center justify-center p-lg fixed inset-0 z-modal bg-surface"

    <nz-spin [nzSize]="size()" [nzTip]="tip()" nzSimple />

    <nz-spin [nzSize]="size()" [nzTip]="tip()" nzSimple />
  </div>
