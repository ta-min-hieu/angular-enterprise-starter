services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: angular-app
    environment:
      PORT: 4000
      # apiBaseUrl/mediaBaseUrl được TRÌNH DUYỆT gọi trực tiếp (XHR/fetch phía client), nên phải
      # là địa chỉ trình duyệt trên máy host truy cập được (vd "localhost:8386" nếu backend expose
      # cổng đó ra host) — KHÔNG dùng host.docker.internal (chỉ container-tới-host mới resolve được,
      # trình duyệt trên host thì không). Lượt gọi phía SSR (server-side, cùng lúc load trang) sẽ
      # không tới được backend qua "localhost" từ TRONG container — đã được xử lý là lỗi chấp nhận
      # được ở ProductsPage.refresh(), client tự gọi lại ngay sau khi hydrate xong.
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8386/base/v1}
      MEDIA_BASE_URL: ${MEDIA_BASE_URL:-http://localhost:8386/base}
      LOG_LEVEL: info
      AUTH_REDIRECT_PATH: /auth/login
      FORBIDDEN_PATH: /forbidden
    expose:
      - '4000'
    networks:
      - starter-network
      - shared-edge
    restart: unless-stopped

# nginx riêng của project này đã bị bỏ — dùng nginx CHUNG với spring-base-api ở
# E:/study/shared-nginx (network "shared-edge"), route "/" -> service "app" ở đây qua tên container
# "angular-app". Xem E:/study/shared-nginx/nginx/default.conf.template.

networks:
  starter-network:
    driver: bridge
  shared-edge:
    external: true
